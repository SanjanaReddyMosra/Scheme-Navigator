<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Matches - Scheme Navigator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container animate-up">
    <div class="results-header">
      <div>
        <h1 class="gradient-text" style="font-size: 2.5rem;">Recommended Schemes</h1>
        <p>Based on your profile, here are the best matches found today.</p>
      </div>
      <div class="search-wrapper">
        <input type="text" class="search-input" id="searchInput" placeholder="Search by name or benefit..." oninput="filterSchemes()">
      </div>
    </div>

    <div id="schemes-grid" class="scheme-grid">
      <!-- Cards injected here -->
      <div class="glass" style="grid-column: 1/-1; padding: 40px; text-align: center;">
        <p>Analyzing matching schemes...</p>
      </div>
    </div>

    <div class="mt-20">
      <a href="wizard.html" class="btn btn-secondary">← Retake Eligibility Check</a>
    </div>
  </div>

  <script>
    let allMatches = [];

    async function getSchemes() {
      const filters = {
        gender: localStorage.getItem("gender"),
        age: localStorage.getItem("age"),
        income: localStorage.getItem("income"),
        caste: localStorage.getItem("caste"),
        education: localStorage.getItem("education")
      };

      try {
        const res = await fetch("http://localhost:5000/getSchemes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(filters)
        });
        
        allMatches = await res.json();
        renderSchemes(allMatches);
      } catch (err) {
        document.getElementById("schemes-grid").innerHTML = `<div class="glass" style="grid-column: 1/-1;"><p>Failed to connect to the server. Please try again.</p></div>`;
      }
    }

    function renderSchemes(schemes) {
      const grid = document.getElementById("schemes-grid");
      if (schemes.length === 0) {
        grid.innerHTML = `<div class="glass" style="grid-column: 1/-1; padding: 40px;"><p>No schemes found matching your criteria. Try adjusting your filters.</p></div>`;
        return;
      }

      grid.innerHTML = schemes.map(s => `
        <div class="glass scheme-card animate-up">
          <div class="tag-list">
             <span class="tag">Match: ${s.score}/6</span>
             <span class="tag" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">${s.gender === 'any' ? 'Universal' : s.gender}</span>
             <span class="tag" style="background: rgba(245, 158, 11, 0.1); color: #f59e0b;">Age ${s.min_age}-${s.max_age}</span>
          </div>
          <h3>${s.scheme_name}</h3>
          <p>${s.benefits}</p>
          <a href="${s.link}" target="_blank" class="btn btn-primary" style="margin-top: auto; padding: 10px;">Apply Now</a>
        </div>
      `).join('');
    }

    function filterSchemes() {
      const term = document.getElementById("searchInput").value.toLowerCase();
      const filtered = allMatches.filter(s => 
        s.scheme_name.toLowerCase().includes(term) || 
        s.benefits.toLowerCase().includes(term)
      );
      renderSchemes(filtered);
    }

    getSchemes();
  </script>
</body>
</html>
