<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Schemes - Scheme Navigator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="glass animate-up" style="max-width: 800px; margin: 40px auto; padding: 40px;">
      <h2 class="gradient-text" style="font-size: 2.5rem; margin-bottom: 10px;">Find Your Schemes</h2>
      <p>Enter your eligibility criteria below to see all matching government programs instantly.</p>

      <div class="options-grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); text-align: left;">
        
        <div class="form-group">
          <label>Gender</label>
          <select id="gender" class="input-field">
            <!-- Populated via API -->
          </select>
        </div>

        <div class="form-group">
          <label>Category (Caste)</label>
          <select id="caste" class="input-field">
            <!-- Populated via API -->
          </select>
        </div>

        <div class="form-group">
          <label>Education Level</label>
          <select id="education" class="input-field">
            <!-- Populated via API -->
          </select>
        </div>

        <div class="form-group">
          <label>Current Age</label>
          <input type="number" id="age" class="input-field" placeholder="e.g. 25" min="0" max="120">
        </div>

        <div class="form-group">
          <label>Annual Income (₹)</label>
          <input type="number" id="income" class="input-field" placeholder="e.g. 200000" min="0">
        </div>

      </div>

      <div style="margin-top: 30px; display: flex; gap: 16px; justify-content: center;">
        <button class="btn btn-primary" style="padding: 16px 40px;" onclick="findSchemes()">Find Schemes Now</button>
        <button class="btn btn-secondary" onclick="window.location.href='index.html'">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    async function loadData() {
      try {
        const res = await fetch("http://localhost:5000/filters");
        const data = await res.json();
        
        const populate = (id, list) => {
          const el = document.getElementById(id);
          el.innerHTML = list.map(item => `<option value="${item}">${item.toUpperCase()}</option>`).join('');
        };

        populate('gender', data.genders);
        populate('caste', data.castes);
        populate('education', data.education);

        // Load previous values if they exist
        if(localStorage.getItem('gender')) document.getElementById('gender').value = localStorage.getItem('gender');
        if(localStorage.getItem('caste')) document.getElementById('caste').value = localStorage.getItem('caste');
        if(localStorage.getItem('education')) document.getElementById('education').value = localStorage.getItem('education');
        if(localStorage.getItem('age')) document.getElementById('age').value = localStorage.getItem('age');
        if(localStorage.getItem('income')) document.getElementById('income').value = localStorage.getItem('income');

      } catch (err) {
        console.error("Filter load error", err);
      }
    }

    function findSchemes() {
      const criteria = {
        gender: document.getElementById('gender').value,
        caste: document.getElementById('caste').value,
        education: document.getElementById('education').value,
        age: document.getElementById('age').value,
        income: document.getElementById('income').value
      };

      // Basic validation
      if(!criteria.age || !criteria.income) return alert("Please fill in age and income.");

      // Store
      for(let key in criteria) localStorage.setItem(key, criteria[key]);

      window.location.href = "result.html";
    }

    loadData();
  </script>
</body>
</html>
