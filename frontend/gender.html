<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filter 1/5 - Gender</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="glass-panel">
    <h2>Step 1: Identity</h2>
    <p>What is your gender?</p>
    
    <div class="options-grid">
      <div class="option-btn" onclick="next('Male')">♂️ Male</div>
      <div class="option-btn" onclick="next('Female')">♀️ Female</div>
      <div class="option-btn" onclick="next('Other')" style="grid-column: 1 / -1;">⚧ Other / Prefer not to say</div>
    </div>
    
    <button class="btn secondary mt-20" onclick="window.history.back()">Back</button>
  </div>

  <script>
    function next(val){
      localStorage.setItem("gender", val);
      // add a small delay for animation wow factor
      document.querySelector('.glass-panel').style.opacity = '0';
      setTimeout(() => {
        window.location.href="age.html";
      }, 300);
    }
  </script>
</body>
</html>
