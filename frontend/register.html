<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Scheme Navigator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container" style="max-width: 450px; margin: auto;">
    <div class="glass animate-up" style="padding: 40px; text-align: center;">
      <h2 class="gradient-text" style="font-size: 2rem; margin-bottom: 10px;">Create Account</h2>
      <p>Join thousands of citizens finding their eligible schemes.</p>
      
      <div class="form-group">
        <label>Username</label>
        <input type="text" class="input-field" id="username" placeholder="Choose a username" autocomplete="off">
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="input-field" id="password" placeholder="Choose a password">
      </div>
      
      <button class="btn btn-primary" id="regBtn" onclick="register()" style="width: 100%; margin-top: 10px;">Register</button>
      <p style="margin-top: 20px; font-size: 0.9rem;">
        <a href="login.html" style="color: #a5b4fc; text-decoration: none;">Already have an account? Login.</a>
      </p>
    </div>
  </div>

  <script>
    async function register() {
      const btn = document.getElementById("regBtn");
      btn.innerText = "Creating...";
      
      try {
        const res = await fetch("http://localhost:5000/register", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });

        const data = await res.json();
        if(data.success){
          alert("Registration Successful!");
          window.location.href="login.html";
        } else {
          alert("Error: " + data.message);
          btn.innerText = "Register";
        }
      } catch (err) {
        alert("Server connection failed.");
        btn.innerText = "Register";
      }
    }
  </script>
</body>
</html>
