<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filter 2/5 - Age</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="glass-panel">
    <h2>Step 2: Age</h2>
    <p>Please provide your age to find eligible schemes.</p>
    
    <div class="input-group">
      <input type="number" id="ageInput" placeholder="e.g. 25" min="0" max="120" style="text-align: center; font-size: 1.5rem;">
    </div>
    
    <div style="display: flex; gap: 15px; margin-top: 30px;">
      <button class="btn secondary" onclick="window.history.back()">Back</button>
      <button class="btn" onclick="next()">Continue</button>
    </div>
  </div>

  <script>
    function next(){
      const val = document.getElementById('ageInput').value;
      if (!val) {
        alert("Please enter a valid age.");
        return;
      }
      localStorage.setItem("age", val);
      
      document.querySelector('.glass-panel').style.opacity = '0';
      setTimeout(() => {
        window.location.href="income.html";
      }, 300);
    }
  </script>
</body>
</html>
