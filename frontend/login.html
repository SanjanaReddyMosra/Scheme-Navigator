<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Scheme Navigator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container" style="max-width: 450px; margin: auto;">
    <div class="glass animate-up" style="padding: 40px; text-align: center;">
      <h2 class="gradient-text" style="font-size: 2rem; margin-bottom: 10px;">Welcome Back</h2>
      <p>Sign in to continue to Scheme Navigator</p>
      
      <div class="form-group">
        <label>Username</label>
        <input type="text" class="input-field" id="username" placeholder="Enter your username" autocomplete="off">
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="input-field" id="password" placeholder="Enter your password">
      </div>
      
      <button class="btn btn-primary" id="loginBtn" onclick="login()" style="width: 100%; margin-top: 10px;">Login</button>
      <p style="margin-top: 20px; font-size: 0.9rem;">
        <a href="register.html" style="color: #a5b4fc; text-decoration: none;">Don't have an account? Register.</a>
      </p>
    </div>
  </div>

  <script>
    async function login() {
      const btn = document.getElementById("loginBtn");
      btn.innerText = "Processing...";
      
      try {
        const res = await fetch("http://localhost:5000/login", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });

        const data = await res.json();

        if(data.success){
          localStorage.setItem("user", document.getElementById('username').value);
          window.location.href="wizard.html";
        } else {
          alert("Invalid login: " + data.message);
          btn.innerText = "Login";
        }
      } catch (err) {
        alert("Failed to connect to server.");
        btn.innerText = "Login";
      }
    }
  </script>
</body>
</html>
