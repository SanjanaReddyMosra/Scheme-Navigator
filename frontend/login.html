<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Scheme Navigator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="glass-panel">
    <h2>Welcome Back</h2>
    <p>Sign in to continue to Scheme Navigator</p>
    
    <div class="input-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="off">
    </div>
    
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>
    
    <button class="btn mt-20" id="loginBtn" onclick="login()">Login</button>
    <p class="mt-20"><a href="register.html" style="color: #a5b4fc;">Don't have an account? Register here.</a></p>
  </div>

  <script>
    async function login() {
      const btn = document.getElementById("loginBtn");
      btn.innerText = "Processing...";
      
      try {
        const res = await fetch("http://localhost:5000/login", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });

        const data = await res.json();

        if(data.success){
          localStorage.setItem("user", document.getElementById('username').value);
          window.location.href="coverpage.html";
        } else {
          alert("Invalid login: " + data.message);
          btn.innerText = "Login";
        }
      } catch (err) {
        alert("Failed to connect to server.");
        btn.innerText = "Login";
      }
    }
  </script>
</body>
</html>
