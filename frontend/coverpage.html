<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Scheme Navigator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="glass-panel text-center">
    <h2>Welcome, <span id="userDisplay" style="color: #a855f7;"></span>!</h2>
    <p>Let's find the best government schemes for you. We will ask you 5 easy questions to tailor our recommendations.</p>
    
    <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 30px;">
      <button class="btn" onclick="startFilters()">Start Questionnaire</button>
      <button class="btn secondary" onclick="logout()">Logout</button>
    </div>
  </div>

  <script>
    const user = localStorage.getItem("user");
    if(!user) {
      window.location.href = "login.html";
    }
    
    document.getElementById("userDisplay").innerText = user;

    function startFilters() {
      // Clear old filters
      localStorage.removeItem("gender");
      localStorage.removeItem("age");
      localStorage.removeItem("income");
      localStorage.removeItem("caste");
      localStorage.removeItem("education");

      window.location.href = "gender.html";
    }

    function logout() {
      localStorage.removeItem("user");
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
